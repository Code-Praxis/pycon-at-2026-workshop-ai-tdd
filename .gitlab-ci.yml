stages:
  - lint
  - test
  - post-test
  - build

default:
  image: ghcr.io/astral-sh/uv:debian-slim
  before_script:
    - uv sync --frozen --all-extras --python 3.14

ruff:
  stage: lint
  script:
    - uv run ruff check src

ty:
  stage: lint
  script:
    - uv run ty check

#unit-tests:
#  stage: test
#  script:
#    - uv run pytest tests/unit --cov=src --cov-report=
#    - mv .coverage .coverage.unit
#  artifacts:
#    paths:
#      - .coverage.unit
#    expire_in: 1 hour

feature-tests:
  stage: test
  script:
    - uv run pytest tests/features --cov=src --cov-report=
    - mv .coverage .coverage.features
  artifacts:
    paths:
      - .coverage.features
    expire_in: 1 hour

merge-coverage:
  stage: post-test
  needs:
#    - unit-tests
    - feature-tests
  script:
    - uv run coverage combine
    - uv run coverage xml
    - uv run coverage html
    - uv run coverage report
  coverage: '/(?i)total.*? (100(?:\.0+)?%|[1-9]?\d(?:\.\d+)?%)/'
  artifacts:
    paths:
      - coverage.xml
      - htmlcov/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

build:
  stage: build
  script:
    - uv build
  artifacts:
    paths:
      - dist/
